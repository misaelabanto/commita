name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.output }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: bun-darwin-x64
            output: commita-darwin-amd64
            runner: ubuntu-latest
          - target: bun-darwin-arm64
            output: commita-darwin-arm64
            runner: ubuntu-latest
          - target: bun-linux-x64
            output: commita-linux-amd64
            runner: ubuntu-latest
          - target: bun-linux-arm64
            output: commita-linux-arm64
            runner: ubuntu-24.04-arm
          - target: bun-windows-x64
            output: commita-windows-amd64.exe
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build
        run: bun build index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          if-no-files-found: error

  version:
    name: Create version tag
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          release_branches: main

      - name: Bump package.json version
        if: steps.tag.outputs.new_tag != ''
        run: |
          VERSION="${{ steps.tag.outputs.new_tag }}"
          VERSION="${VERSION#v}"
          jq --arg version "$VERSION" '.version = $version' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Commit version bump
        if: steps.tag.outputs.new_tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.tag.outputs.new_tag }} [skip ci]"
          git push origin main

  release:
    name: Release
    needs: [build, version]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          generate_release_notes: true
          files: |
            commita-darwin-amd64
            commita-darwin-arm64
            commita-linux-amd64
            commita-linux-arm64
            commita-windows-amd64.exe

  npm-publish:
    name: Publish to npm
    needs: [build, version]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install

      - run: bun run build:node

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
